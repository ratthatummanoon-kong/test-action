name: AWS Deploy Workflow

# 1. กำหนดว่า workflow นี้จะทำงานตอนไหน (เช่น เมื่อมีการ push code)

on:
    push:
        branches:
            - main

# 2. กำหนด Job ที่จะให้ทำงาน

jobs:
    deploy-to-aws:
        runs-on: ubuntu-latest # เครื่องเซิร์ฟเวอร์จำลองที่จะใช้รัน

        # 3. ใส่ Steps การทำงานของคุณตรงนี้

        steps:
            - name: Checkout repository

              uses: actions/checkout@v4

            - name: Authenticate to AWS

              uses: aws-actions/configure-aws-credentials@v4

              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

                  aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

                  aws-region: ap-southeast-1

            - name: Verify connection (ทดสอบว่าล็อกอินสำเร็จไหม)

              run: aws sts get-caller-identity
